<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>1LEEWAY | Accueil</title>
    <meta
      name="description"
      content="Accueil du site 1LEEWAY avec accès rapide au portfolio et aux ressources."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bricolage+Grotesque:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <div class="backdrop" aria-hidden="true"></div>

    <main class="home-shell">
      <section class="hero-card" aria-labelledby="heroTitle">
        <p class="badge">Site principal</p>
        <h1 id="heroTitle">Bienvenue sur 1LEEWAY</h1>
        <p class="subtitle">
          Accédez rapidement à mon portfolio et à mes ressources, entièrement en français.
        </p>

        <nav class="action-grid" aria-label="Navigation principale">
          <a class="action-link" href="/portfolio/">
            <span class="action-title">Portfolio</span>
            <span class="action-desc">Découvrir mes projets, mon parcours et mon stack.</span>
          </a>
          <a class="action-link" href="/ressources/">
            <span class="action-title">Ressources</span>
            <span class="action-desc">Voir mes liens, outils et contenus utiles.</span>
          </a>
        </nav>
      </section>
    </main>

</html>
